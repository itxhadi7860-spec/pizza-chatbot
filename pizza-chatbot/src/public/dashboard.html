<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bistro Club - Admin Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#0f0f1a; color:white; min-height:100vh; }

.header { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:16px 24px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #25D366; }
.header h1 { font-size:22px; color:#25D366; display:flex; align-items:center; gap:10px; }
.live { background:red; color:white; padding:3px 10px; border-radius:20px; font-size:11px; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

.tabs { display:flex; gap:8px; padding:16px 24px 0; }
.tab { padding:8px 20px; border-radius:20px 20px 0 0; border:none; cursor:pointer; font-weight:600; font-size:13px; background:#1a1a2e; color:#888; border:1px solid #2a2a4a; }
.tab.active { background:#25D366; color:white; border-color:#25D366; }

.section { display:none; padding:20px 24px; }
.section.active { display:block; }

/* STATS */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
.stat { background:#1a1a2e; border:1px solid #2a2a4a; border-radius:12px; padding:16px; text-align:center; }
.stat-num { font-size:28px; font-weight:800; }
.stat-label { font-size:12px; color:#888; margin-top:4px; }

/* SALES */
.sales-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.sales-card { background:#1a1a2e; border:1px solid #2a2a4a; border-radius:12px; padding:20px; }
.sales-title { font-size:14px; font-weight:700; color:#25D366; margin-bottom:14px; border-bottom:1px solid #2a2a4a; padding-bottom:8px; }
.cat-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #1a1a2e; }
.cat-name { font-size:13px; color:#ccc; }
.cat-stats { display:flex; gap:16px; }
.cat-qty { font-size:12px; color:#888; }
.cat-earn { font-size:13px; font-weight:700; color:#25D366; }
.cat-bar { height:6px; background:#25D366; border-radius:3px; margin-top:4px; transition:width 0.5s; }

/* ORDER COLUMNS */
.cols { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
.col { background:#1a1a2e; border:1px solid #2a2a4a; border-radius:12px; overflow:hidden; }
.col-head { padding:12px 16px; font-weight:700; font-size:13px; display:flex; justify-content:space-between; }
.col-head.pending { border-bottom:2px solid #FF8C00; color:#FF8C00; }
.col-head.preparation { border-bottom:2px solid #FFD700; color:#FFD700; }
.col-head.dispatched { border-bottom:2px solid #007AFF; color:#007AFF; }
.col-head.completed { border-bottom:2px solid #25D366; color:#25D366; }
.col-body { padding:10px; min-height:150px; }

.order-card { background:#111827; border:1px solid #2a2a4a; border-radius:10px; padding:12px; margin-bottom:10px; border-left:3px solid #FF8C00; }
.order-card.preparation { border-left-color:#FFD700; }
.order-card.dispatched { border-left-color:#007AFF; }
.order-card.completed { border-left-color:#25D366; opacity:0.7; }
.order-id { font-size:11px; color:#888; }
.order-name { font-size:14px; font-weight:700; margin:4px 0; }
.order-detail { font-size:11px; color:#aaa; margin:2px 0; }
.order-items { font-size:12px; color:#ccc; margin:6px 0; line-height:1.6; }
.order-footer { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.order-total { font-size:15px; font-weight:800; color:#25D366; }
.order-payment { font-size:11px; background:rgba(255,255,255,0.08); padding:2px 8px; border-radius:10px; }
.order-time { font-size:10px; color:#666; margin-top:4px; }
.btn-row { display:flex; gap:6px; margin-top:8px; }
.action-btn { flex:1; padding:8px; border:none; border-radius:8px; font-size:11px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.action-btn:hover { opacity:0.8; }
.btn-prep { background:#FFD700; color:#000; }
.btn-dispatch { background:#007AFF; color:white; }
.btn-complete { background:#25D366; color:white; }
.btn-print { background:#8B5CF6; color:white; }

.empty { text-align:center; color:#444; padding:30px 10px; font-size:13px; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:#1a2e1a; border:1px solid #25D366; color:white; padding:10px 24px; border-radius:30px; font-size:13px; font-weight:600; transition:transform 0.4s; z-index:999; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* PRINT RECEIPT */
@media print {
  body * { visibility:hidden; }
  #printArea, #printArea * { visibility:visible; }
  #printArea { position:fixed; left:0; top:0; width:80mm; }
}
#printArea {
  display:none;
  font-family:'Courier New',monospace;
  width:80mm;
  padding:10px;
  background:white;
  color:black;
  font-size:12px;
  line-height:1.6;
}
.receipt-logo { text-align:center; font-size:20px; font-weight:900; border-bottom:2px dashed #000; padding-bottom:8px; margin-bottom:8px; }
.receipt-row { display:flex; justify-content:space-between; }
.receipt-divider { border-top:1px dashed #000; margin:6px 0; }
.receipt-center { text-align:center; }
.receipt-total { font-size:16px; font-weight:900; text-align:center; margin:6px 0; }

@media(max-width:900px) { .cols,.stats,.sales-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:600px) { .cols,.stats,.sales-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>🍕 Bistro Club <span class="live">● LIVE</span></h1>
  <div style="color:#888;font-size:13px;" id="lastUpdate">Loading...</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('orders')">📦 Orders</button>
  <button class="tab" onclick="showTab('sales')">📊 Today's Sales</button>
</div>

<!-- ORDERS TAB -->
<div id="tab-orders" class="section active">
  <div class="stats">
    <div class="stat"><div class="stat-num" style="color:#FF8C00" id="s-pending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-num" style="color:#FFD700" id="s-preparation">0</div><div class="stat-label">Preparation</div></div>
    <div class="stat"><div class="stat-num" style="color:#007AFF" id="s-dispatched">0</div><div class="stat-label">Dispatched</div></div>
    <div class="stat"><div class="stat-num" style="color:#25D366" id="s-completed">0</div><div class="stat-label">Completed</div></div>
  </div>
  <div class="cols">
    <div class="col"><div class="col-head pending">🔴 Pending <span id="c-pending">0</span></div><div class="col-body" id="col-pending"></div></div>
    <div class="col"><div class="col-head preparation">🟡 Preparation <span id="c-preparation">0</span></div><div class="col-body" id="col-preparation"></div></div>
    <div class="col"><div class="col-head dispatched">🔵 Dispatched <span id="c-dispatched">0</span></div><div class="col-body" id="col-dispatched"></div></div>
    <div class="col"><div class="col-head completed">✅ Completed <span id="c-completed">0</span></div><div class="col-body" id="col-completed"></div></div>
  </div>
</div>

<!-- SALES TAB -->
<div id="tab-sales" class="section">
  <div class="stats">
    <div class="stat"><div class="stat-num" style="color:#25D366" id="today-orders">0</div><div class="stat-label">Today's Orders</div></div>
    <div class="stat"><div class="stat-num" style="color:#FFD700" id="today-earning">Rs. 0</div><div class="stat-label">Today's Earning</div></div>
    <div class="stat"><div class="stat-num" style="color:#007AFF" id="today-completed">0</div><div class="stat-label">Completed</div></div>
    <div class="stat"><div class="stat-num" style="color:#FF8C00" id="today-pending">0</div><div class="stat-label">Pending</div></div>
  </div>
  <div class="sales-grid">
    <div class="sales-card">
      <div class="sales-title">📊 Category-wise Sales Today</div>
      <div id="cat-sales"></div>
    </div>
    <div class="sales-card">
      <div class="sales-title">🏆 Top Items Today</div>
      <div id="top-items"></div>
    </div>
  </div>
  <div class="sales-card" style="margin-bottom:20px;">
    <div class="sales-title">📋 Today's Order History</div>
    <div id="order-history"></div>
  </div>
</div>

<!-- HIDDEN PRINT AREA -->
<div id="printArea"></div>

<div class="toast" id="toast"></div>

<script>
const STATUSES = ["pending","preparation","dispatched","completed"];
let allOrders = [];

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
}

async function loadOrders() {
  try {
    const res = await fetch("/api/orders");
    allOrders = await res.json();
    renderOrders(allOrders);
    renderSales(allOrders);
    document.getElementById("lastUpdate").textContent = "Updated: " + new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

function renderOrders(orders) {
  const grouped = { pending:[], preparation:[], dispatched:[], completed:[] };
  orders.forEach(o => { if (grouped[o.status]) grouped[o.status].push(o); });
  STATUSES.forEach(s => {
    document.getElementById("s-"+s).textContent = grouped[s].length;
    document.getElementById("c-"+s).textContent = grouped[s].length;
    const col = document.getElementById("col-"+s);
    col.innerHTML = grouped[s].length === 0
      ? '<div class="empty">No orders</div>'
      : grouped[s].map(o => renderCard(o)).join("");
  });
}

function renderCard(o) {
  const items = o.items.map(i => i.name + " x" + i.qty).join(", ");
  let btns = "";
  if (o.status === "pending") {
    btns = `<div class="btn-row"><button class="action-btn btn-prep" onclick="updateStatus('${o.orderId}','preparation')">✅ Send to Prep</button></div>`;
  } else if (o.status === "preparation") {
    btns = `<div class="btn-row"><button class="action-btn btn-dispatch" onclick="updateStatus('${o.orderId}','dispatched')">🛵 Dispatch</button></div>`;
  } else if (o.status === "dispatched") {
    btns = `<div class="btn-row">
      <button class="action-btn btn-complete" onclick="updateStatus('${o.orderId}','completed')">✅ Complete</button>
      <button class="action-btn btn-print" onclick="printReceipt('${o.orderId}')">🖨️ Print</button>
    </div>`;
  }
  return `<div class="order-card ${o.status}">
    <div class="order-id">${o.orderId}</div>
    <div class="order-name">👤 ${o.customer}</div>
    <div class="order-detail">📞 ${o.phone}</div>
    <div class="order-detail">📍 ${o.address}</div>
    <div class="order-items">📦 ${items}</div>
    <div class="order-footer">
      <span class="order-total">Rs. ${o.total}</span>
      <span class="order-payment">${o.payment}</span>
    </div>
    <div class="order-time">🕐 ${o.time}</div>
    ${btns}
  </div>`;
}

function renderSales(orders) {
  const today = new Date().toISOString().split("T")[0];
  const todayOrders = orders.filter(o => o.date === today);

  document.getElementById("today-orders").textContent = todayOrders.length;
  document.getElementById("today-earning").textContent = "Rs. " + todayOrders.reduce((s,o) => s+o.total, 0).toLocaleString();
  document.getElementById("today-completed").textContent = todayOrders.filter(o=>o.status==="completed").length;
  document.getElementById("today-pending").textContent = todayOrders.filter(o=>o.status==="pending").length;

  // Category sales
  const catSales = {};
  todayOrders.forEach(o => {
    o.items.forEach(item => {
      const cat = getCategoryForItem(item.id);
      if (!catSales[cat]) catSales[cat] = { qty: 0, earning: 0 };
      catSales[cat].qty += item.qty;
      catSales[cat].earning += item.price * item.qty;
    });
  });

  const maxEarn = Math.max(...Object.values(catSales).map(c=>c.earning), 1);
  const catEmojis = { Pizza:"🍕", "Fast Food":"🍔", Rice:"🍚", Platter:"🍖", Drinks:"🥤" };
  
  document.getElementById("cat-sales").innerHTML = Object.keys(catSales).length === 0
    ? '<div class="empty">No sales yet today</div>'
    : Object.entries(catSales).sort((a,b)=>b[1].earning-a[1].earning).map(([cat,data]) => `
      <div class="cat-row">
        <div>
          <div class="cat-name">${catEmojis[cat]||"🍽️"} ${cat}</div>
          <div style="width:${Math.round(data.earning/maxEarn*100)}%;min-width:4px;height:4px;background:#25D366;border-radius:2px;margin-top:4px;"></div>
        </div>
        <div class="cat-stats">
          <span class="cat-qty">${data.qty} sold</span>
          <span class="cat-earn">Rs. ${data.earning}</span>
        </div>
      </div>`).join("");

  // Top items
  const itemSales = {};
  todayOrders.forEach(o => {
    o.items.forEach(item => {
      if (!itemSales[item.name]) itemSales[item.name] = { qty:0, earning:0 };
      itemSales[item.name].qty += item.qty;
      itemSales[item.name].earning += item.price * item.qty;
    });
  });

  document.getElementById("top-items").innerHTML = Object.keys(itemSales).length === 0
    ? '<div class="empty">No items sold today</div>'
    : Object.entries(itemSales).sort((a,b)=>b[1].qty-a[1].qty).slice(0,8).map(([name,data],i) => `
      <div class="cat-row">
        <span class="cat-name">${i+1}. ${name}</span>
        <div class="cat-stats">
          <span class="cat-qty">x${data.qty}</span>
          <span class="cat-earn">Rs. ${data.earning}</span>
        </div>
      </div>`).join("");

  // Order history
  document.getElementById("order-history").innerHTML = todayOrders.length === 0
    ? '<div class="empty">No orders today yet</div>'
    : `<table style="width:100%;border-collapse:collapse;font-size:12px;">
        <tr style="color:#888;border-bottom:1px solid #2a2a4a;">
          <th style="padding:6px;text-align:left;">Order ID</th>
          <th style="padding:6px;text-align:left;">Customer</th>
          <th style="padding:6px;text-align:left;">Items</th>
          <th style="padding:6px;text-align:right;">Total</th>
          <th style="padding:6px;text-align:center;">Payment</th>
          <th style="padding:6px;text-align:center;">Status</th>
        </tr>
        ${todayOrders.map(o => `
          <tr style="border-bottom:1px solid #1a1a2e;">
            <td style="padding:6px;color:#aaa;">${o.orderId}</td>
            <td style="padding:6px;">${o.customer}</td>
            <td style="padding:6px;color:#aaa;">${o.items.map(i=>i.name+" x"+i.qty).join(", ")}</td>
            <td style="padding:6px;text-align:right;color:#25D366;font-weight:700;">Rs. ${o.total}</td>
            <td style="padding:6px;text-align:center;color:#aaa;">${o.payment}</td>
            <td style="padding:6px;text-align:center;">
              <span style="padding:2px 8px;border-radius:10px;font-size:10px;background:${
                o.status==='completed'?'#1a3a1a':o.status==='dispatched'?'#1a1a3a':o.status==='preparation'?'#3a3a1a':'#3a1a1a'
              };color:${
                o.status==='completed'?'#25D366':o.status==='dispatched'?'#007AFF':o.status==='preparation'?'#FFD700':'#FF8C00'
              };">${o.status}</span>
            </td>
          </tr>`).join("")}
      </table>`;
}

function getCategoryForItem(itemId) {
  const map = { p:"Pizza", f:"Fast Food", r:"Rice", pl:"Platter", d:"Drinks" };
  for (const [prefix, cat] of Object.entries(map)) {
    if (itemId.startsWith(prefix)) return cat;
  }
  return "Other";
}

function printReceipt(orderId) {
  const order = allOrders.find(o => o.orderId === orderId);
  if (!order) return;

  const itemRows = order.items.map(i => {
    const total = i.price * i.qty;
    return `<div class="receipt-row"><span>${i.name}</span><span>${i.qty} x Rs.${i.price}</span><span>Rs.${total}</span></div>`;
  }).join("");

  let payInfo = "";
  if (order.payment === "JazzCash") payInfo = `<div>JazzCash: 03111679036</div>`;
  else if (order.payment === "Easypaisa") payInfo = `<div>Easypaisa: 03111679036</div>`;

  document.getElementById("printArea").innerHTML = `
    <div class="receipt-logo">
      🍕 BISTRO CLUB<br>
      <span style="font-size:11px;font-weight:400;">Delicious Food Delivered</span>
    </div>
    <div class="receipt-row"><span>Order ID:</span><span>${order.orderId}</span></div>
    <div class="receipt-row"><span>Date:</span><span>${order.time}</span></div>
    <div class="receipt-divider"></div>
    <div class="receipt-row"><span>Customer:</span><span>${order.customer}</span></div>
    <div class="receipt-row"><span>Phone:</span><span>${order.phone}</span></div>
    <div style="margin:4px 0;"><strong>Address:</strong> ${order.address}</div>
    <div class="receipt-divider"></div>
    <div style="font-weight:700;margin-bottom:4px;">ITEMS:</div>
    ${itemRows}
    <div class="receipt-divider"></div>
    <div class="receipt-total">TOTAL: Rs. ${order.total}</div>
    <div class="receipt-center">${order.payment}</div>
    ${payInfo}
    <div class="receipt-divider"></div>
    <div class="receipt-center" style="font-size:11px;">Thank you for your order!<br>Bistro Club | ${new Date().toLocaleDateString()}</div>
  `;

  document.getElementById("printArea").style.display = "block";
  window.print();
  setTimeout(() => {
    document.getElementById("printArea").style.display = "none";
  }, 1000);
}

async function updateStatus(orderId, status) {
  try {
    const res = await fetch("/api/orders/" + encodeURIComponent(orderId) + "/status", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ status })
    });
    const data = await res.json();
    if (data.success) {
      showToast("✅ " + orderId + " → " + status + " | Message sent to client!");
      loadOrders();
    }
  } catch(e) { console.error(e); }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

loadOrders();
setInterval(loadOrders, 3000);
</script>
</body>
</html>

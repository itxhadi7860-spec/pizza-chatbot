<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bistro Club - Live Order Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .column-gradient {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <span class="text-3xl">🍕</span>
            <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">
                BISTRO CLUB
            </h1>
            <span class="text-xs bg-slate-700 text-slate-300 px-2 py-1 rounded-md font-mono border border-slate-600">LIVE DASHBOARD</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span id="connection-status" class="text-xs font-medium text-slate-300">Connected</span>
            </div>
            <button onclick="fetchOrders()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-4 py-2 rounded-lg transition-all duration-200 cursor-pointer text-sm shadow-md shadow-amber-500/10">
                🔄 Refresh
            </button>
        </div>
    </nav>

    <!-- Main Content Grid -->
    <main class="p-6 max-w-[1600px] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- 1. PENDING COLUMN -->
            <div class="bg-slate-800/50 rounded-2xl border border-slate-700/60 p-4 column-gradient">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700/50">
                    <h2 class="font-bold text-lg flex items-center gap-2 text-amber-400">
                        <span>📥</span> Pending Orders
                    </h2>
                    <span id="count-pending" class="bg-amber-500/10 text-amber-400 font-mono text-xs px-2.5 py-1 rounded-full border border-amber-500/20 font-bold">0</span>
                </div>
                <div id="pending-list" class="space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto pr-1"></div>
            </div>

            <!-- 2. PREPARATION COLUMN -->
            <div class="bg-slate-800/50 rounded-2xl border border-slate-700/60 p-4 column-gradient">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700/50">
                    <h2 class="font-bold text-lg flex items-center gap-2 text-blue-400">
                        <span>👨‍🍳</span> In Preparation
                    </h2>
                    <span id="count-preparing" class="bg-blue-500/10 text-blue-400 font-mono text-xs px-2.5 py-1 rounded-full border border-blue-500/20 font-bold">0</span>
                </div>
                <div id="preparing-list" class="space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto pr-1"></div>
            </div>

            <!-- 3. COMPLETED COLUMN -->
            <div class="bg-slate-800/50 rounded-2xl border border-slate-700/60 p-4 column-gradient">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700/50">
                    <h2 class="font-bold text-lg flex items-center gap-2 text-green-400">
                        <span>✅</span> Completed / Dispatched
                    </h2>
                    <span id="count-completed" class="bg-green-500/10 text-green-400 font-mono text-xs px-2.5 py-1 rounded-full border border-green-500/20 font-bold">0</span>
                </div>
                <div id="completed-list" class="space-y-4 max-h-[calc(100vh-200px)] overflow-y-auto pr-1"></div>
            </div>

        </div>
    </main>

    <!-- JavaScript logic to fetch and update statuses -->
    <script>
        async function fetchOrders() {
            try {
                document.getElementById('connection-status').innerText = "Updating...";
                const response = await fetch('/api/orders');
                const orders = await response.getJson ? await response.getJson() : await response.json();
                renderOrders(orders);
                document.getElementById('connection-status').innerText = "Connected";
            } catch (error) {
                console.error("Orders load karne mein error:", error);
                document.getElementById('connection-status').innerText = "Connection Error";
            }
        }

        function renderOrders(orders) {
            const pendingList = document.getElementById('pending-list');
            const preparingList = document.getElementById('preparing-list');
            const completedList = document.getElementById('completed-list');

            // Clear absolute columns
            pendingList.innerHTML = '';
            preparingList.innerHTML = '';
            completedList.innerHTML = '';

            let counts = { pending: 0, preparing: 0, completed: 0 };

            orders.forEach(order => {
                const status = order.status || 'pending';
                if(counts[status] !== undefined) counts[status]++;

                const card = document.createElement('div');
                card.className = "bg-slate-800 border border-slate-700/70 rounded-xl p-4 shadow-md hover:border-slate-600 transition-all duration-150";
                
                // Constructing items list markup safely
                let itemsHtml = (order.items || []).map(item => `
                    <div class="flex justify-between items-center text-sm bg-slate-900/40 px-2.5 py-1.5 rounded border border-slate-700/30">
                        <span class="text-slate-300 font-medium">${item.name} <span class="text-slate-500 text-xs">x${item.qty}</span></span>
                        <span class="font-mono text-xs text-amber-400/90">Rs. ${item.price * item.qty}</span>
                    </div>
                `).join('');

                // Select Action button based on current state
                let actionButton = '';
                if (status === 'pending') {
                    actionButton = `
                        <button onclick="updateStatus('${order.orderId}', 'preparing')" class="w-full mt-3 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2 px-3 rounded-lg transition duration-150 cursor-pointer shadow-sm">
                            👨‍🍳 Preparation Mein Bhejo
                        </button>
                    `;
                } else if (status === 'preparing') {
                    actionButton = `
                        <button onclick="updateStatus('${order.orderId}', 'completed')" class="w-full mt-3 bg-green-600 hover:bg-green-500 text-white text-xs font-bold py-2 px-3 rounded-lg transition duration-150 cursor-pointer shadow-sm">
                            ✅ Complete & Dispatch
                        </button>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="text-xs font-mono font-bold bg-slate-700 text-slate-300 px-2 py-0.5 rounded border border-slate-600">${order.orderId}</span>
                            <h3 class="font-bold text-slate-200 mt-1.5 text-base">${order.customer}</h3>
                        </div>
                        <span class="text-[11px] font-mono text-slate-500">${order.time ? order.time.split(',')[1] || order.time : ''}</span>
                    </div>
                    
                    <div class="text-xs text-slate-400 space-y-0.5 mb-3 font-medium">
                        <p class="flex items-center gap-1">📞 <span class="text-slate-300">${order.phone}</span></p>
                        <p class="flex items-start gap-1">📍 <span class="text-slate-300">${order.address}</span></p>
                        <p class="flex items-center gap-1 text-[11px] mt-1 bg-slate-900/60 w-fit px-1.5 py-0.5 rounded text-slate-400 border border-slate-700/50">💰 ${order.payment}</p>
                    </div>

                    <div class="space-y-1.5 mb-3 border-t border-b border-slate-700/40 py-2.5">
                        ${itemsHtml}
                    </div>

                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-400 font-medium">Total Bill:</span>
                        <span class="text-base font-mono font-black text-emerald-400">Rs. ${order.total}</span>
                    </div>

                    ${actionButton}
                `;

                if (status === 'pending') pendingList.appendChild(card);
                else if (status === 'preparing') preparingList.appendChild(card);
                else if (status === 'completed') completedList.appendChild(card);
            });

            // Sync counters UI
            document.getElementById('count-pending').innerText = counts.pending;
            document.getElementById('count-preparing').innerText = counts.preparing;
            document.getElementById('count-completed').innerText = counts.completed;
        }

        async function updateStatus(orderId, newStatus) {
            try {
                const response = await fetch('/api/update-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId, status: newStatus })
                });
                
                if (response.ok) {
                    fetchOrders(); // Refresh layout
                } else {
                    alert('Status update karne mein masla aya!');
                }
            } catch (error) {
                console.error("Status update error:", error);
            }
        }

        // Auto-refresh updates every 5 seconds
        fetchOrders();
        setInterval(fetchOrders, 5000);
    </script>
</body>
</html>
